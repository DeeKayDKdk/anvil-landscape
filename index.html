function useInView(t=0.15){
  const ref=useRef(null);
  const[v,sv]=useState(false);
  useEffect(()=>{
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){sv(true);o.disconnect();}},{threshold:t});
    if(ref.current)o.observe(ref.current);
    return()=>o.disconnect();
  },[]);
  return[ref,v];
}
function Reveal({children,delay=0,style={}}){
  const[ref,v]=useInView();
  return <div ref={ref} style={{opacity:v?1:0,transform:v?"translateY(0)":"translateY(32px)",transition:`opacity .75s ease ${delay}s,transform .75s ease ${delay}s`,...style}}>{children}</div>;
}
function Logo({size=44,dark=false,style={}}){
  return <img src={LOGO} alt="Anvil Landscape Co." style={{height:size,width:"auto",display:"block",filter:dark?"brightness(0) invert(1)":"none",opacity:dark?0.92:1,...style}}/>;
}

function App(){

    .bo{background:transparent;color:${F};border:1.5px solid rgba(245,242,236,.4);padding:14px 30px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:border-color .22s,background .22s}

    .pi{border-left:2px solid ${LG};padding-left:28px;padding-bottom:40px;position:relative}
    .pi:last-child{padding-bottom:0;border-left-color:transparent}
    .pd{position:absolute;left:-7px;top:3px;width:12px;height:12px;background:${MD};border:2px solid ${F};border-radius:50%}

        <div className="hp" style={{padding:"0 44px 80px",maxWidth:900,position:"relative"}}>
          <div className="hf d1" style={{marginBottom:28}}>
            <span className="dm" style={{fontSize:10.5,letterSpacing:".24em",textTransform:"uppercase",color:"rgba(245,242,236,.45)",display:"flex",alignItems:"center",gap:14}}>
              <span style={{width:36,height:1,background:"rgba(245,242,236,.3)",display:"block"}}/>
              Denver · Xeriscape &amp; Hardscaping Specialists
            </span>
          </div>
          <h1 className="pf h1r hf d2" style={{fontSize:"clamp(46px,7vw,82px)",fontWeight:800,color:F,lineHeight:1.06,letterSpacing:"-.02em",marginBottom:30}}>
            Precision-built<br/>
            <em style={{fontStyle:"italic",fontWeight:600,color:"#9ECFB0"}}>landscapes</em><br/>
            that endure.
          </h1>
          <p className="dm hf d3" style={{fontSize:15.5,lineHeight:1.75,color:"rgba(245,242,236,.6)",maxWidth:480,marginBottom:44,fontWeight:300}}>
            Water-smart design, expert installation, and year-round care — for Denver homeowners who want it done right, once.
          </p>
          <div className="hf d4" style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"center"}}>
            <button className="bp" onClick={()=>go("consult")}>Book Design Consultation — $450</button>
            <button className="bo" onClick={()=>go("services")}>Our Services</button>
          </div>
          <p className="dm hf d4" style={{marginTop:14,fontSize:11,color:"rgba(245,242,236,.3)",letterSpacing:".05em"}}>Fee credited to your project · Same-day response · No obligation</p>
        </div>
        <div style={{position:"absolute",bottom:36,right:44,display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
          <span className="dm" style={{fontSize:8.5,letterSpacing:".22em",textTransform:"uppercase",color:"rgba(245,242,236,.25)",writingMode:"vertical-rl"}}>Scroll</span>
          <div style={{width:1,height:44,background:"linear-gradient(to bottom,rgba(245,242,236,.25),transparent)"}}/>
        </div>
      </section>

      <div style={{background:GR,borderBottom:"1px solid rgba(245,242,236,.07)"}}>
        <div className="trg" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",maxWidth:1040,margin:"0 auto"}}>
          {TRUST.map((t,i)=>(
            <div key={i} className="tc">
              <div className="pf" style={{fontSize:22,color:"#9ECFB0",fontWeight:700,marginBottom:5}}>{t.stat}</div>
              <div className="dm" style={{fontSize:10.5,color:"rgba(245,242,236,.45)",letterSpacing:".1em",textTransform:"uppercase"}}>{t.label}</div>
            </div>
          ))}
        </div>
      </div>

              <p className="dm" style={{fontSize:14,color:"#555",maxWidth:360,lineHeight:1.75,fontWeight:300}}>Our model is built around one idea: every install client becomes a long-term care client. Three services. One lasting relationship.</p>

          <div className="thc" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:3}}>

                  <div className="dm" style={{fontSize:9.5,letterSpacing:".2em",textTransform:"uppercase",color:i===0?MD:"rgba(245,242,236,.4)",marginBottom:10}}>{s.sub}</div>

                  <p className="dm" style={{fontSize:13.5,lineHeight:1.8,color:i===0?"#3A5C45":"rgba(245,242,236,.6)",marginBottom:28,fontWeight:300}}>{s.desc}</p>
                  <div style={{borderTop:`1px solid ${i===0?"#B8D4C0":"rgba(245,242,236,.15)"}`,paddingTop:14}}>
                    <span className="dm" style={{fontSize:11,letterSpacing:".06em",color:i===0?MD:"#9ECFB0",fontWeight:500}}>{s.tag}</span>
                  </div>
                </div>
              </Reveal>
            ))}
          </div>
        </div>
      </section>

      <section id="process" className="sp" style={{padding:"96px 44px",background:"#EDE9E0"}}>
        <div style={{maxWidth:1100,margin:"0 auto"}}>
          <div className="twc" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:80,alignItems:"start"}}>
            <Reveal>
              <div className="sl">How It Works</div>
              <h2 className="pf" style={{fontSize:"clamp(28px,3.5vw,44px)",fontWeight:800,color:GR,lineHeight:1.1,marginBottom:22}}>Four steps.<br/><em style={{fontWeight:600}}>No surprises.</em></h2>
              <p className="dm" style={{fontSize:14,color:"#555",lineHeight:1.8,fontWeight:300,marginBottom:14}}>The #1 complaint Denver homeowners have about landscapers: slow responses, vague bids, and crews that disappear mid-job.</p>
              <p className="dm" style={{fontSize:14,color:"#555",lineHeight:1.8,fontWeight:300,marginBottom:36}}>We built our process around fixing every one of those. You'll have a written proposal before work begins, progress updates throughout, and a crew that treats your property like it's their own.</p>
              <button className="bp" onClick={()=>go("consult")}>Start With a Consultation</button>
            </Reveal>
            <Reveal delay={.15}>
              <div style={{paddingTop:4}}>
                {PROCESS.map((p,i)=>(
                  <div key={i} className="pi">
                    <div className="pd"/>
                    <div className="dm" style={{fontSize:9.5,letterSpacing:".2em",color:SG,marginBottom:7,fontWeight:600}}>{p.n}</div>
                    <h4 className="pf" style={{fontSize:19,fontWeight:700,color:GR,marginBottom:9}}>{p.title}</h4>
                    <p className="dm" style={{fontSize:13.5,color:"#666",lineHeight:1.75,fontWeight:300}}>{p.body}</p>
                  </div>
                ))}
              </div>
            </Reveal>
          </div>
        </div>
      </section>

      <section id="about" className="sp" style={{padding:"96px 44px",background:F}}>
        <div style={{maxWidth:1100,margin:"0 auto"}}>
          <div className="twc" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:80,alignItems:"center"}}>
            <Reveal>
              <div className="sl">Why Anvil</div>
              <h2 className="pf" style={{fontSize:"clamp(28px,3.5vw,44px)",fontWeight:800,color:GR,lineHeight:1.1,marginBottom:24}}>Built for Colorado.<br/><em style={{fontWeight:600}}>Built to last.</em></h2>
              <p className="dm" style={{fontSize:14,lineHeight:1.85,color:"#555",marginBottom:20,fontWeight:300}}>Denver's water future is constrained — restrictions tighten every year. The best outdoor spaces aren't just beautiful, they're engineered for this climate. We specialize in xeriscape and hardscaping because it's the right work for Colorado, and almost no one does it with genuine craftsmanship.</p>
              <p className="dm" style={{fontSize:14,lineHeight:1.85,color:"#555",marginBottom:36,fontWeight:300}}>Anvil is a small team by design. You work with the same people from consultation through installation through seasonal care. We respond the same day. We show up when we say. That shouldn't be a differentiator — in this industry, it is.</p>
              <div style={{display:"flex",gap:36,flexWrap:"wrap"}}>
                {[["ALCC","Certified Member"],["Denver Water","Smart Approved"],["ISA","Trained Arborists"]].map(([a,b])=>(
                  <div key={a} style={{borderLeft:`2px solid ${LG}`,paddingLeft:12}}>
                    <div className="dm" style={{fontSize:11.5,fontWeight:600,color:GR,letterSpacing:".04em"}}>{a}</div>
                    <div className="dm" style={{fontSize:10,color:"#999",letterSpacing:".06em",marginTop:2}}>{b}</div>
                  </div>
                ))}
              </div>
            </Reveal>
            <Reveal delay={.18}>
              <div style={{position:"relative"}}>
                <div style={{position:"absolute",top:-18,right:-18,width:"100%",height:"100%",border:`1px solid ${LG}`,zIndex:0,pointerEvents:"none"}}/>
                <div style={{background:GR,padding:"52px 44px",position:"relative",zIndex:1}}>
                  <div style={{fontSize:36,color:SG,marginBottom:18,fontFamily:"Georgia",lineHeight:1}}>"</div>
                  <p className="pf" style={{fontSize:17,fontStyle:"italic",color:"#9ECFB0",lineHeight:1.65,marginBottom:28,fontWeight:600}}>We don't build what looks good today. We build what makes sense for Colorado's next decade — and we maintain it alongside you.</p>
                  <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:32}}>
                    <Logo size={48} dark={true}/>
                    <div>
                      <div className="dm" style={{fontSize:12.5,color:F,fontWeight:600}}>Anvil Landscape Co.</div>
                      <div className="dm" style={{fontSize:10.5,color:"rgba(245,242,236,.4)"}}>Denver, Colorado</div>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:2}}>
                    {[["Mid-market focus","$8K–$45K projects"],["Xeriscape certified","Denver Water approved"],["Same-day response","Guaranteed"],["Annual care programs","From $600 / yr"]].map(([a,b],i)=>(
                      <div key={i} style={{background:"rgba(17,24,16,.5)",padding:"13px 14px"}}>
                        <div className="dm" style={{fontSize:10.5,color:"#9ECFB0",fontWeight:600,marginBottom:2}}>{a}</div>
                        <div className="dm" style={{fontSize:9.5,color:"rgba(245,242,236,.35)"}}>{b}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </Reveal>
          </div>
        </div>
      </section>

      <section id="reviews" className="sp" style={{padding:"96px 44px",background:"#EDE9E0"}}>
        <div style={{maxWidth:1100,margin:"0 auto"}}>
          <Reveal>
            <div className="sl">Client Reviews</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:52,flexWrap:"wrap",gap:16}}>
              <h2 className="pf" style={{fontSize:"clamp(28px,3.5vw,44px)",fontWeight:800,color:GR,lineHeight:1.1}}>What Denver<br/><em style={{fontWeight:600}}>homeowners say.</em></h2>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {[...Array(5)].map((_,i)=><span key={i} style={{color:GD,fontSize:18}}>★</span>)}
                <span className="dm" style={{fontSize:12,color:"#888",marginLeft:8}}>5.0 on Google</span>
              </div>
            </div>
          </Reveal>
          <div className="thc" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:20}}>
            {TESTIMONIALS.map((t,i)=>(
              <Reveal key={i} delay={i*.12}>
                <div className="rv">
                  <div style={{display:"flex",gap:3,marginBottom:20}}>{[...Array(5)].map((_,j)=><span key={j} style={{color:GD,fontSize:14}}>★</span>)}</div>
                  <p className="dm" style={{fontSize:13.5,lineHeight:1.8,color:"#444",fontWeight:300,marginBottom:24,fontStyle:"italic"}}>"{t.quote}"</p>
                  <div style={{borderTop:"1px solid #E0DAD0",paddingTop:18}}>
                    <div className="dm" style={{fontSize:12.5,fontWeight:600,color:GR}}>{t.name}</div>
                    <div className="dm" style={{fontSize:11,color:"#999",marginTop:2}}>{t.location}</div>
                  </div>
                </div>
              </Reveal>
            ))}
          </div>
        </div>
      </section>

      <section id="consult" className="sp" style={{padding:"96px 44px",background:`linear-gradient(140deg,${DK} 0%,#172B1E 55%,${GR} 100%)`,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:"50%",right:"-4%",transform:"translateY(-50%)",width:500,height:500,border:"1px solid rgba(245,242,236,.03)",borderRadius:"50%",pointerEvents:"none"}}/>
        <div style={{maxWidth:660,margin:"0 auto",textAlign:"center",position:"relative"}}>
          <Reveal>
            <div className="sl sll" style={{justifyContent:"center"}}>Ready to Begin</div>
            <h2 className="pf" style={{fontSize:"clamp(30px,4vw,50px)",color:F,fontWeight:800,lineHeight:1.1,marginBottom:20}}>Book your design<br/><em style={{fontWeight:600,color:"#9ECFB0"}}>consultation.</em></h2>
            <p className="dm" style={{fontSize:14.5,color:"rgba(245,242,236,.55)",lineHeight:1.8,marginBottom:44,fontWeight:300}}>A $450 site visit, analysis, and full conceptual plan — credited entirely toward your project. We respond the same day and schedule most consultations within the week.</p>
            {submitted?(
              <div style={{background:"rgba(78,154,110,.15)",border:"1px solid rgba(78,154,110,.3)",padding:"36px 32px"}}>
                <div style={{fontSize:32,marginBottom:12,color:"#9ECFB0"}}>✓</div>
                <div className="pf" style={{fontSize:22,color:"#9ECFB0",fontWeight:700,marginBottom:10}}>Request received.</div>
                <p className="dm" style={{fontSize:14,color:"rgba(245,242,236,.55)",fontWeight:300}}>We'll reach out to {form.name||"you"} within the day to schedule your consultation.</p>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div className="fmr" style={{display:"flex",gap:12}}>
                  <input className="fi dm" placeholder="Your name" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
                  <input className="fi dm" placeholder="Phone or email" value={form.contact} onChange={e=>setForm(f=>({...f,contact:e.target.value}))}/>
                </div>
                <input className="fi dm" placeholder="Tell us about your project (optional)" value={form.project} onChange={e=>setForm(f=>({...f,project:e.target.value}))}/>
                <button className="bp" style={{fontSize:13,padding:"17px",letterSpacing:".12em",opacity:(!form.name||!form.contact)?.5:1}} onClick={send}>Request Consultation — $450</button>
                <p className="dm" style={{fontSize:11,color:"rgba(245,242,236,.28)",letterSpacing:".05em"}}>We'll reach out within hours, not days.</p>

            )}
          </Reveal>

      </section>

      <footer style={{background:DK,padding:"40px 44px 32px",borderTop:"1px solid rgba(245,242,236,.05)"}}>
        <div style={{maxWidth:1100,margin:"0 auto"}}>
          <div className="fin" style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:24,marginBottom:28}}>
            <Logo size={56} dark={true}/>
            <div style={{display:"flex",gap:32,flexWrap:"wrap"}}>
              {["Services","Process","About","Reviews","Consult"].map(l=>(
                <span key={l} className="fl" onClick={()=>go(l.toLowerCase())}>{l}</span>
              ))}
            </div>
            <div className="dm" style={{fontSize:12,color:"rgba(245,242,236,.4)"}}>Denver, CO · Same-day response</div>
          </div>
          <div style={{borderTop:"1px solid rgba(245,242,236,.05)",paddingTop:20}}>
            <div className="dm" style={{fontSize:11,color:"rgba(245,242,236,.2)",textAlign:"center",letterSpacing:".04em"}}>© 2026 Anvil Landscape Co. · Denver, Colorado · All rights reserved</div>
          </div>
        </div>
      </footer>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
  </script>
